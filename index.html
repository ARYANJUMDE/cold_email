<head>
    <title>Cold Email Generator</title>
</head>
<body>

    <h1>Cold Email Generator</h1>

    <input id="industry" placeholder="Enter Industry"><br><br>
    <input id="product" placeholder="Enter Product"><br><br>

    <button onclick="generate()">Generate Emails</button>

    <pre id="output"></pre>

    <script>
        async function generate() {
            const industry = document.getElementById("industry").value;
            const product = document.getElementById("product").value;

            const response = await fetch("/api/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    industry: industry,
                    product: product
                })
            });

            const data = await response.json();
            document.getElementById("output").innerText = JSON.stringify(data, null, 2);
        }
    </script>

</body>
</html>
